name: VisorPlugin
version: '${version}'
main: org.vmstudio.visor.bukkit.VisorBukkitPlugin
api-version: '1.20'
folia-supported: true
authors: [vmstudio]
description: Server-side support for the Visor VR
website: https://github.com/VisorModStudio/VisorPlugin
load: POSTWORLD
commands:
  visor:
    description: Visor admin commands
    usage: /visor reload | status
    permission: visor.admin
permissions:
  visor.admin:
    description: Manage VisorPlugin (reload settings, status)
    default: op
