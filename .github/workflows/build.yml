name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            25
            21
          cache: gradle

      - run: chmod +x ./gradlew

      - run: ./gradlew build --max-workers=2 --no-daemon --stacktrace -Porg.gradle.java.installations.fromEnv=JAVA_HOME_25_X64

      - uses: actions/upload-artifact@v4
        with:
          name: VisorPlugin
          path: build/libs/VisorPlugin-*.jar
          if-no-files-found: error
